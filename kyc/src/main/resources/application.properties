server.port = 8084
spring.application.name=kyc
server.forward-headers-strategy=framework

# Datasource
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Mail configuration
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:}
spring.mail.username=${MAIL_USER:}
spring.mail.password=${MAIL_PASS:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.properties.mail.smtp.ssl.enable=true

# Actuator
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# Confirmation email
app.mail.from=${MAIL_FROM:}
app.mail.subject.activation=Confirm your email for Let’s Peppol [{{peppolId}}]
app.mail.activation.base-url=${UI_URL:http://localhost:9000}/email-confirmation?token=

# Password reset email
app.mail.subject.password-reset=Reset your password for LetsPeppol
app.mail.password-reset.base-url=${UI_URL:http://localhost:9000}/reset-password?token=

# RSA key pair for JWT signing (Spring Authorization Server).
# Defaults to classpath for local dev; in deployed environments point these at a mounted secret,
# e.g. JWT_PRIVATE_KEY=file:/run/secrets/kyc-private.pem so the key never lives inside the image.
jwt.private-key=${JWT_PRIVATE_KEY:classpath:kyc-private.pem}
jwt.public-key=${JWT_PUBLIC_KEY:classpath:kyc-public.pem}

# Audience stamped on access tokens and required by the resource servers.
oauth2.audience=${OAUTH2_AUDIENCE:letspeppol-api}
# Account the app service-to-service token impersonates (the seeded APP account).
oauth2.app-client.account-external-id=${KYC_AUTH_APP_EXTERNAL_ID:b095630d-1bf3-4250-bf9e-2d49e6ce505b}

cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:9000;http://127.0.0.1:9000;http://localhost:8086;http://127.0.0.1:8086;https://localhost:8086;https://127.0.0.1:8086;https://letspeppol.httpsonlan.com:3001;https://login.letspeppol.org}

# Secret keys to encrypt eID data
encryption.keys.s1=${ENCRYPTION_KEY_1:4Y7X0M3yzr3K6mxE7L0YpAqXq+C1mVHpmiM7jWE1d7E=}
encryption.active-key-id=s1

# Service client secret (used to register the service client in the auth server)
service.client.secret=${SERVICE_CLIENT_SECRET}

# Service client for proxy calls (Client Credentials)
kyc.service-client.id=kyc-service
kyc.service-client.secret=${SERVICE_CLIENT_SECRET}
kyc.service-client.token-uri=http://kyc:8084/oauth2/token

# Proxy api
proxy.api.url=${PROXY_API_URL:http://localhost:8086}

# KBO enterprise lookup
kbo.lookup.base-url=${KBO_LOOKUP_BASE_URL:https://kbopub.economie.fgov.be/kbopub-m/enterprise}

# KBO SFTP sync
kbo.sftp.host=${KBO_SFTP_HOST:ftps.economie.fgov.be}
kbo.sftp.port=${KBO_SFTP_PORT:22}
kbo.sftp.username=${KBO_SFTP_USERNAME:}
kbo.sftp.password=${KBO_SFTP_PASSWORD:}
kbo.sftp.base-dir=${KBO_SFTP_BASE_DIR:/}
kbo.sftp.full-dir=${KBO_SFTP_FULL_DIR:full}
kbo.sftp.delta-dir=${KBO_SFTP_DELTA_DIR:delta}
# Default: run delta sync every day at 02:30
kbo.sftp.delta-cron=${KBO_SFTP_DELTA_CRON:0 30 2 * * *}

# OAuth2 Authorization Server.
# Issuer stamped into every token's "iss"; app/proxy validate it against KYC_ISSUER_URI (wired to
# this same value). Both blank => issuer validation is skipped everywhere.
spring.security.oauth2.authorizationserver.issuer=${ISSUER_URI:}
oauth2.ui.redirect-uri=${OAUTH2_REDIRECT_URI:https://localpeppol.org:3001/callback}

# Session must outlive the 1h access token, since the SPA renews it via silent re-auth against this
# session — otherwise the first renewal lands after the session expired and forces interactive login.
server.servlet.session.timeout=${KYC_SESSION_TIMEOUT:8h}

# WebAuthn / Passkeys
webauthn.rp.id=${WEBAUTHN_RP_ID:localpeppol.org}
webauthn.rp.name=Let's Peppol
webauthn.rp.origins=${WEBAUTHN_RP_ORIGINS:https://localpeppol.org:3001}

# Contract Pdf dirs
contract.data.dir=${CONTRACT_DATA_DIR:}
