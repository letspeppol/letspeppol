<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{login.page-title}">Log in — Let's Peppol</title>
    <link rel="stylesheet" th:href="@{/css/login.css}">
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
    <meta name="_kyc_base" th:content="@{/}">
    <meta name="_ui_base" th:content="${uiBaseUrl}">
    <script>
        (function() {
            var theme = localStorage.getItem('peppol.theme.v1') || 'light';
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
</head>
<body>
<button class="theme-toggle" id="theme-toggle" type="button" title="Toggle theme">
    <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
    <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20.985 12.486a9 9 0 1 1-9.473-9.472c.405-.022.617.46.402.803a6 6 0 0 0 8.268 8.268c.344-.215.825-.004.803.401"/></svg>
</button>
<div class="centered">
    <div class="card">
        <div class="logo">
            <img th:src="@{/images/logo.png}" alt="Let's Peppol" width="192" height="80">
        </div>
        <h1 th:text="#{login.heading}">Log in</h1>
        <form class="auth-form" th:action="@{/login}" method="post">
            <div class="grid">
                <label class="field full">
                    <span th:text="#{login.email}">Email</span>
                    <input name="username" type="email" th:placeholder="#{login.email-placeholder}" required autofocus autocomplete="username webauthn">
                </label>
                <label class="field full">
                    <div style="display: flex; justify-content: space-between">
                        <span th:text="#{login.password}">Password</span>
                        <a th:href="${uiBaseUrl + '/forgot-password'}" th:text="#{login.forgot-password}">Forgot my password</a>
                    </div>
                    <input name="password" type="password" required>
                </label>
                <label class="field full checkbox">
                    <input type="checkbox" name="remember-me">
                    <span th:text="#{login.remember-me}">Remember me</span>
                </label>
            </div>
            <p th:if="${error}" class="form-error" aria-live="assertive" th:text="#{login.error}">Login failed. Please check your credentials.</p>
            <div class="auth-actions">
                <button type="submit" class="btn primary" th:text="#{login.sign-in}">Sign in</button>
            </div>
            <div class="passkey-divider" id="passkey-divider" style="display:none"><span th:text="#{login.or}">or</span></div>
            <button type="button" class="btn passkey-btn" id="passkey-login-btn" style="display:none">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15.5 7.5 2.3 2.3a1 1 0 0 0 1.4 0l2.1-2.1a1 1 0 0 0 0-1.4L19 4"/><path d="m21 2-9.6 9.6"/><circle cx="7.5" cy="15.5" r="5.5"/></svg>
                <span th:text="#{login.passkey-button}">Sign in with a passkey</span>
            </button>
            <div class="auth-info">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"/>
                    <path d="M12 16v-4"/>
                    <path d="M12 8h.01"/>
                </svg>
                <span th:text="#{login.new-user}">New here?</span>
                <a th:href="${uiBaseUrl + '/registration'}" th:text="#{login.register-link}">Register your company</a>
            </div>
        </form>
    </div>
</div>
<script th:src="@{/js/webauthn-login.js}" defer></script>
<script th:src="@{/js/theme-toggle.js}" defer></script>
</body>
</html>
