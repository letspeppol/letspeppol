spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_UPPER=false;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=none

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Confirmation email
app.mail.activation.base-url=http://localhost:8085/api/verify?token=
app.mail.from=test-noreply@kyc.local

# Password reset email
app.mail.password-reset.base-url=http://localhost:8085/password-reset?token=
app.mail.subject.password-reset=Reset your password (test)

# RSA key pair for JWT signing (test keys)
jwt.private-key=classpath:kyc-private.pem
jwt.public-key=classpath:kyc-public.pem

# Service client (not used in tests but required for bean creation)
service.client.secret=test-secret
kyc.service-client.id=test-client
kyc.service-client.secret=test-secret
kyc.service-client.token-uri=http://localhost:8084/oauth2/token

# Secret keys to encrypt eID data
encryption.keys.default=4Y7X0M3yzr3K6mxE7L0YpAqXq+C1mVHpmiM7jWE1d7E=
encryption.keys.rotated=Q7p1iTg5b4N2xJr0sVf8L9yQa3wZ6uHkP1dE7mC2rX8=
encryption.active-key-id=rotated

# Proxy api - https://api.letspeppol.org?
proxy.api.url=${PROXY_API_URL:http://localhost:3000}

# KBO enterprise lookup
kbo.lookup.base-url=${KBO_LOOKUP_BASE_URL:https://kbopub.economie.fgov.be/kbopub-m/enterprise}

cors.allowed-origins=http://localhost:9000

# WebAuthn / Passkeys
webauthn.rp.id=localhost
webauthn.rp.name=Let's Peppol Test
webauthn.rp.origins=http://localhost:8084

# OAuth2 Authorization Server (test)
spring.security.oauth2.authorizationserver.issuer=http://localhost:8084
oauth2.ui.redirect-uri=http://localhost:9000/callback

