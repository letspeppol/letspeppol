services:
  adminer:
    image: adminer
    restart: always
    depends_on:
      db:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.adminer.rule=Host(`${ADMINER_DOMAIN}`)"
      - "traefik.http.routers.adminer.entrypoints=internal"
      - "traefik.http.routers.adminer.tls.certresolver=${CERT_RESOLVER}"
      - "traefik.http.services.adminer.loadbalancer.server.port=8080"

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
      APP_USER: ${APP_USER}
      APP_PASS: ${APP_PASS}
      KYC_USER: ${KYC_USER}
      KYC_PASS: ${KYC_PASS}
      PROXY_USER: ${PROXY_USER}
      PROXY_PASS: ${PROXY_PASS}
    volumes:
      - db-data:/var/lib/postgresql/data
      - ../../postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    networks:
      - web
      - default

  backup:
    image: postgres:16-alpine
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGHOST: db
      PGUSER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      TZ: Europe/Brussels
      DB_LIST: "app kyc proxy"   # dump these databases hourly
      DATA_DIR: /opt/data/db
    volumes:
      - /opt/data/db:/opt/data/db
    command: >
      sh -c '
        set -eu
        mkdir -p "$$DATA_DIR"

        cat <<'\''EOF'\'' >/etc/crontabs/root
        SHELL=/bin/sh
        TZ=Europe/Brussels

        0 0,12 * * * /bin/sh -c '\''
          set -eu

          ts=$$(date "+%Y-%m-%dT%H-%M-%S%z")

          for d in $$DB_LIST; do
            echo "[backup] preparing $$d at $$ts"

            # Keep only 1 existing backup before creating the new one.
            # After the new one succeeds, there will be 2 total.
            ls -1t "$$DATA_DIR"/$$d-*.dump 2>/dev/null \
              | tail -n +2 \
              | xargs -r rm -f --

            tmp="$$DATA_DIR/.$$d-$$ts.dump.tmp"
            final="$$DATA_DIR/$$d-$$ts.dump"

            echo "[backup] dumping $$d to temp file $$tmp"

            if pg_dump \
              -h "$$PGHOST" \
              -U "$$PGUSER" \
              -d "$$d" \
              -F c \
              -Z 6 \
              -f "$$tmp"
            then
              mv "$$tmp" "$$final"
              echo "[backup] completed $$d -> $$final"
            else
              echo "[backup] FAILED $$d"
              rm -f "$$tmp"
              exit 1
            fi
          done
        '\''
        EOF

        echo "[backup] scheduled for 00:00 and 12:00 Europe/Brussels"
        exec crond -f -l 2
      '
    networks:
      - default

volumes:
  db-data:

networks:
  web:
    external: true
