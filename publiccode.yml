description:
  en:
    shortDescription: Free and open-source Peppol access point for e-invoicing.
    longDescription: >-
      A free alternative to become Peppol-compliant

      Purpose-built for SMEs, freelancers, and accountants. No lock-in. Your
      data remains yours. Backed by a Belgian non-profit and a global
      open-source community.


      Inbox-like UI

      Send and receive e-invoices and credit notes through a web interface that
      feels familiar — like email.


      Peppol BIS / UBL

      Built around Peppol BIS 3.0 and UBL 2.1 standards to interoperate with the
      network from day one.


      Data ownership

      You always own your data. We do not mine or sell access to your business
      information.


      Trust by design

      GDPR-friendly, EU hosting, transparent code, and audits through community
      processes.


      Open-source

      Free as in freedom. No license fees. Contribute integrations over time
      together with the community.


      No costs and no fees

      Started and maintained by a non-profit organization, driven by community
      and supported by donors and supporters.
    features:
      - Send & receive e-invoices over the Peppol network with an inbox that
        feels like email
