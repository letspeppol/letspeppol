spring.application.name=app

spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_UPPER=false;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=none

spring.flyway.enabled=false
# spring.flyway.locations=classpath:db/migration

# keep logging relatively quiet in tests
logging.level.root=WARN
logging.level.org.letspeppol.app=INFO

# override external API config so tests don't require real env variables
proxy.api.url=http://localhost:8086
kyc.api.url=http://localhost:8084
peppol.directory.url=https://test-directory.peppol.eu
open-collective.url=https://api.opencollective.com/graphql/v2/
open-collective.api-key=dummy-test-key
cors.allowed-origins=http://localhost:9000

document.price=0.00

# JWT validation via JWKS (disabled/mocked in tests via SecurityAutoConfiguration)
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8084/oauth2/jwks

# Service client (not used in tests but required for ProxyConfig bean creation)
app.service-client.id=test-client
app.service-client.secret=test-secret
app.service-client.token-uri=http://localhost:8084/oauth2/token

backup.data.dir=

# Mail defaults for tests
notification.mail.from=${MAIL_FROM:test@example.com}
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:25}
spring.mail.username=${MAIL_USER:}
spring.mail.password=${MAIL_PASS:}

# KYC auth defaults for tests
kyc.auth.app.external-id=b095630d-1bf3-4250-bf9e-2d49e6ce505b
kyc.auth.app.password=letspeppol

