<template>
    <import from="./passkey-manager.css"></import>
    <div if.bind="!supported" class="alert alert--info">
        Your browser does not support passkeys.
    </div>

    <template if.bind="supported">
        <div style="display: grid; gap: 0.75rem">
            <div repeat.for="passkey of passkeys" class="passkey-row">
                <div class="passkey-info">
                    <template if.bind="editingId === passkey.id">
                        <div class="passkey-rename-row">
                            <input type="text" value.bind="editingName"
                                   keyup.trigger="$event.key === 'Enter' ? saveRename(passkey) : ($event.key === 'Escape' ? cancelRename() : undefined)" />
                            <button type="button" class="btn" click.trigger="saveRename(passkey)" title="Save">
                                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
                            </button>
                            <button type="button" class="btn" click.trigger="cancelRename()" title="Cancel">
                                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
                            </button>
                        </div>
                    </template>
                    <template else>
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="passkey-icon"><path d="m15.5 7.5 2.3 2.3a1 1 0 0 0 1.4 0l2.1-2.1a1 1 0 0 0 0-1.4L19 4"/><path d="m21 2-9.6 9.6"/><circle cx="7.5" cy="15.5" r="5.5"/></svg>
                        <div style="min-width: 0">
                            <div class="passkey-name">${passkey.displayName}</div>
                            <div class="passkey-meta">
                                Added ${formatDate(passkey.createdOn)} &middot; Last used ${formatDate(passkey.lastUsedOn)}
                            </div>
                        </div>
                    </template>
                </div>
                <div class="passkey-actions" if.bind="editingId !== passkey.id">
                    <button type="button" class="btn" click.trigger="startRename(passkey)" title="Rename">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.174 6.812a1 1 0 0 0-3.986-3.987L3.842 16.174a2 2 0 0 0-.5.83l-1.321 4.352a.5.5 0 0 0 .623.622l4.353-1.32a2 2 0 0 0 .83-.497z"/></svg>
                    </button>
                    <button type="button" class="btn danger" click.trigger="confirmDelete(passkey)" title="Delete">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                    </button>
                </div>
            </div>

            <div if.bind="passkeys.length === 0" class="passkey-empty">
                No passkeys registered yet.
            </div>
        </div>

        <div class="passkey-add" style="margin-top: 0.75rem">
            <label class="field" style="flex: 1; margin: 0">
                <input type="text" value.bind="newPasskeyName" placeholder="Passkey name (e.g. MacBook Pro)"
                       keyup.trigger="$event.key === 'Enter' ? addPasskey() : undefined" />
            </label>
            <button type="button" class="btn primary" click.trigger="addPasskey()" disabled.bind="adding">
                <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
                <span>${adding ? 'Registering...' : 'Add passkey'}</span>
            </button>
        </div>
    </template>
</template>
