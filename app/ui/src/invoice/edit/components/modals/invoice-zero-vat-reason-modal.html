<div class="modal" role="dialog" aria-modal="true" show.bind="open">
    <div class="modal-backdrop"></div>
    <div class="modal-card">
        <header class="modal-header">
            <h2 t="invoice.zero-vat-reason.modal.title">0% VAT reason</h2>
            <button class="icon-btn" click.trigger="closeModal()" aria-label="Close dialog" t="[aria-label]common.close" title="Close" t="[title]common.close">×</button>
        </header>
        <div class="modal-body" style="display:grid;gap:var(--space-1)">
            <label class="field required">
                <span t="invoice.zero-vat-reason.modal.reason-type">Reason type</span>
                <select value.to-view="reasonId ?? ''" change.trigger="reasonId = $event.target.value || undefined" disabled.bind="readOnly">
                    <option value="" t="common.none"></option>
                    <option repeat.for="reason of zeroVatReasonOptions" value.bind="reason" t.bind="getZeroVatReasonLabelKey(reason)"></option>
                </select>
            </label>
            <label class="field required">
                <span t="invoice.zero-vat-reason.modal.reason-text">Explanation</span>
                <input type="text" value.bind="reasonText" placeholder="Why is this line 0% VAT?" t="[placeholder]invoice.zero-vat-reason.modal.reason-text-placeholder" readonly.bind="readOnly" />
            </label>
            <template if.bind="line && line.Item.ClassifiedTaxCategory?.Percent === 0 && reasonId === 'E' && !readOnly">
                <div style="display:grid;gap:.5rem;padding:.85rem 1rem;border-radius:.75rem;border:1px solid color-mix(in hsl, var(--status-open) 35%, var(--border-soft));background:color-mix(in hsl, var(--status-open) 10%, var(--panel));">
                    <strong style="font-size:.92rem" t="invoice.zero-vat-reason.modal.account-box-title">Do you have an Exempt from VAT account?</strong>
                    <span style="color:var(--muted);font-size:.9rem" t="invoice.zero-vat-reason.modal.account-box-text">Change here the setting of your account:</span>
                    <label class="field">
                        <span t="invoice.zero-vat-reason.modal.account-ruleset">Account VAT ruleset</span>
                        <select value.bind="selectedAccountRuleset">
                            <option repeat.for="option of vatRulesetOptions" model.bind="option" t.bind="getVatRulesetLabelKey(option)"></option>
                        </select>
                    </label>
                </div>
            </template>
        </div>
        <footer class="modal-footer">
            <button type="button" class="btn" click.trigger="closeModal()" t="common.cancel">Cancel</button>
            <button type="button" class="btn primary" click.trigger="save()" disabled.bind="!reasonId || !reasonText?.trim()" t="common.apply">Apply</button>
        </footer>
    </div>
</div>
